---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

# The tests below query a dedicated, FROZEN fixture repository whose
# release set never changes. The fixture deliberately contains a
# normal release, an unprefixed-tag release, and a published
# pre-release, exercising every code path with publicly visible
# releases. The tests enumerate this matrix dynamically (see the
# "Enumerate fixture release matrix" step) instead of hard-coding tag
# names, so tagging releases or merging PRs anywhere never requires
# editing this workflow.
#
# Fixture contents (must remain stable):
#   v2.0.0       normal, latest
#   v1.5.0-rc.1  published pre-release (excluded by production_only)
#   v1.0.0       normal
#   0.9.0        normal, unprefixed tag
env:
  FIXTURE_REPO: "lfreleng-actions/github-releases-test-fixture"

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # ---------------------------------------------------------------
      # 0. Enumerate the fixture's release matrix once and derive the
      #    values later tests need. Deriving them dynamically (rather
      #    than hard-coding tag strings) is what decouples this suite
      #    from release activity: nothing here needs editing when new
      #    releases are tagged or drafted.
      # ---------------------------------------------------------------
      - name: "Enumerate fixture release matrix"
        id: fixture
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Enumerate fixture release matrix (dynamic; no hard-coding)
          set -euo pipefail
          MATRIX=$(gh release list --repo "$FIXTURE_REPO" \
            --json tagName,isDraft,isPrerelease --limit 100)
          echo "Fixture release matrix:"
          printf '%s\n' "$MATRIX" | python3 -m json.tool

          # Newest visible normal (non-draft, non-pre-release) tag. The
          # action accepts both v-prefixed and unprefixed tags, so any
          # normal tag works for the existence tests below.
          NORMAL_TAG=$(printf '%s' "$MATRIX" | python3 -c '
          import json, sys
          for r in json.load(sys.stdin):
              if not r["isDraft"] and not r["isPrerelease"]:
                  print(r["tagName"]); break
          ')
          if [ -z "$NORMAL_TAG" ]; then
            echo "❌ Fixture has no visible normal release"
            exit 1
          fi

          # Toggle the v prefix to produce the alternate form. Passing
          # this exercises the action's bidirectional prefix matching.
          case "$NORMAL_TAG" in
            v*) ALT_TAG="${NORMAL_TAG#v}" ;;
            *)  ALT_TAG="v${NORMAL_TAG}" ;;
          esac

          # Count visible pre-releases so the production_only test can
          # assert it is not vacuous (something is actually excluded).
          PRERELEASE_COUNT=$(printf '%s' "$MATRIX" | python3 -c '
          import json, sys
          print(sum(
              1 for r in json.load(sys.stdin)
              if r["isPrerelease"] and not r["isDraft"]
          ))
          ')

          {
            echo "normal_tag=$NORMAL_TAG"
            echo "normal_tag_alt=$ALT_TAG"
            echo "prerelease_count=$PRERELEASE_COUNT"
          } >> "$GITHUB_OUTPUT"
          echo "Derived: normal_tag=$NORMAL_TAG alt=$ALT_TAG" \
            "visible_prereleases=$PRERELEASE_COUNT"

      # ---------------------------------------------------------------
      # 1. Default inputs: current repo, text mode, no tag.
      #    Exercises the default-token fallback (no token input passed).
      # ---------------------------------------------------------------
      - name: "Test: default inputs against current repository"
        id: defaults
        uses: ./
        with:
          summary_output: "true"

      - name: "Validate: default inputs"
        shell: bash
        env:
          RELEASES: ${{ steps.defaults.outputs.releases }}
          RELEASED: ${{ steps.defaults.outputs.released }}
        run: |
          # Validate default-inputs outputs
          set -euo pipefail
          # With no tag input, released must be the literal string "false"
          if [ "$RELEASED" != "false" ]; then
            echo "❌ Expected released=false when no tag provided"
            echo "Got: released='$RELEASED'"
            exit 1
          fi
          echo "✅ released=false when no tag provided"
          # releases may be empty for this repo (pre-release); just print
          echo "releases output (first 5 lines):"
          printf '%s\n' "$RELEASES" | head -n 5 || true

      # ---------------------------------------------------------------
      # 2. Remote repository, text mode, no tag.
      #    Asserts that releases are returned for a repo we do not
      #    check out locally.
      # ---------------------------------------------------------------
      - name: "Test: remote repository in text mode"
        id: remote_text
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}

      - name: "Validate: remote repository text output"
        shell: bash
        env:
          RELEASES: ${{ steps.remote_text.outputs.releases }}
          RELEASED: ${{ steps.remote_text.outputs.released }}
        run: |
          # Validate remote repository text output
          set -euo pipefail
          if [ -z "$RELEASES" ]; then
            echo "❌ Expected non-empty releases from fixture repository"
            exit 1
          fi
          if [ "$RELEASED" != "false" ]; then
            echo "❌ Expected released=false (no tag provided)"
            echo "Got: released='$RELEASED'"
            exit 1
          fi
          echo "✅ Remote repository text output populated"
          printf '%s\n' "$RELEASES" | head -n 5

      # ---------------------------------------------------------------
      # 3. Remote repository, JSON mode with multiple fields.
      #    Asserts valid JSON containing the requested fields.
      # ---------------------------------------------------------------
      - name: "Test: remote repository in JSON mode"
        id: remote_json
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          return_type: "json"
          json_fields: "tagName,publishedAt"

      - name: "Validate: remote repository JSON output"
        shell: bash
        env:
          RELEASES: ${{ steps.remote_json.outputs.releases }}
        run: |
          # Validate remote repository JSON output
          set -euo pipefail
          if [ -z "$RELEASES" ]; then
            echo "❌ Expected non-empty JSON payload"
            exit 1
          fi
          # Must parse as JSON and contain requested fields
          echo "$RELEASES" | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          if not isinstance(data, list) or not data:
              print("❌ Expected non-empty JSON array"); sys.exit(1)
          first = data[0]
          for field in ("tagName", "publishedAt"):
              if field not in first:
                  print(f"❌ Missing field {field!r} in JSON output")
                  sys.exit(1)
          print(f"✅ JSON output parses as list of {len(data)} releases")
          '

      # ---------------------------------------------------------------
      # 4. Tag checking: the alternate (v-prefix-toggled) form of an
      #    existing release. Exercises the action's prefix-toggle
      #    matching path. The tag is derived dynamically from the
      #    fixture, so it is never hard-coded.
      # ---------------------------------------------------------------
      - name: "Test: toggled-prefix tag matches existing release"
        id: tag_unprefixed
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          tag: ${{ steps.fixture.outputs.normal_tag_alt }}

      - name: "Validate: toggled-prefix tag matching"
        shell: bash
        env:
          RELEASED: ${{ steps.tag_unprefixed.outputs.released }}
          TAG: ${{ steps.fixture.outputs.normal_tag_alt }}
        run: |
          # Validate toggled-prefix tag matching
          set -euo pipefail
          if [ "$RELEASED" != "true" ]; then
            echo "❌ Expected released=true for toggled tag $TAG"
            echo "Got: released='$RELEASED'"
            exit 1
          fi
          echo "✅ Toggled-prefix tag $TAG matched existing release"

      # ---------------------------------------------------------------
      # 5. Tag checking: the exact form of an existing release.
      # ---------------------------------------------------------------
      - name: "Test: exact tag matches directly"
        id: tag_prefixed
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          tag: ${{ steps.fixture.outputs.normal_tag }}

      - name: "Validate: exact tag matching"
        shell: bash
        env:
          RELEASED: ${{ steps.tag_prefixed.outputs.released }}
          TAG: ${{ steps.fixture.outputs.normal_tag }}
        run: |
          # Validate exact tag matching
          set -euo pipefail
          if [ "$RELEASED" != "true" ]; then
            echo "❌ Expected released=true for exact tag $TAG"
            echo "Got: released='$RELEASED'"
            exit 1
          fi
          echo "✅ Exact tag $TAG matched directly"

      # ---------------------------------------------------------------
      # 6. Tag checking: a tag that definitely does not exist.
      #    Asserts released equals literal "false".
      # ---------------------------------------------------------------
      - name: "Test: non-existent tag returns released=false"
        id: tag_missing
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          tag: "v99.99.99-does-not-exist"

      - name: "Validate: non-existent tag handling"
        shell: bash
        env:
          RELEASED: ${{ steps.tag_missing.outputs.released }}
        run: |
          # Validate non-existent tag handling
          set -euo pipefail
          if [ "$RELEASED" != "false" ]; then
            echo "❌ Expected released=false for non-existent tag"
            echo "Got: released='$RELEASED'"
            exit 1
          fi
          echo "✅ Non-existent tag correctly returns released=false"

      # ---------------------------------------------------------------
      # 7. Tag checking in JSON mode: makes sure the second (tag-name)
      #    query path works correctly and released is populated.
      # ---------------------------------------------------------------
      - name: "Test: tag checking in JSON mode"
        id: tag_json
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          tag: ${{ steps.fixture.outputs.normal_tag }}
          return_type: "json"
          json_fields: "tagName,publishedAt"

      - name: "Validate: tag checking in JSON mode"
        shell: bash
        env:
          RELEASED: ${{ steps.tag_json.outputs.released }}
          RELEASES: ${{ steps.tag_json.outputs.releases }}
          TAG: ${{ steps.fixture.outputs.normal_tag }}
        run: |
          # Validate tag checking in JSON mode
          set -euo pipefail
          if [ "$RELEASED" != "true" ]; then
            echo "❌ Expected released=true for $TAG in JSON mode"
            echo "Got: released='$RELEASED'"
            exit 1
          fi
          if ! echo "$RELEASES" |\
              python3 -c 'import json,sys; json.load(sys.stdin)'; then
            echo "❌ releases output is not valid JSON"
            exit 1
          fi
          echo "✅ Tag checking works in JSON mode with valid JSON payload"

      # ---------------------------------------------------------------
      # 8. Sort order: asc vs desc on the same repo must differ.
      # ---------------------------------------------------------------
      - name: "Test: ascending sort order"
        id: order_asc
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          order: "asc"

      - name: "Test: descending sort order"
        id: order_desc
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          order: "desc"

      - name: "Validate: sort orders produce opposite first entries"
        shell: bash
        env:
          ASC: ${{ steps.order_asc.outputs.releases }}
          DESC: ${{ steps.order_desc.outputs.releases }}
        run: |
          # Validate sort order behaviour
          set -euo pipefail
          ASC_FIRST=$(printf '%s\n' "$ASC" | head -n 1)
          DESC_FIRST=$(printf '%s\n' "$DESC" | head -n 1)
          ASC_LAST=$(printf '%s\n' "$ASC" | tail -n 1)
          DESC_LAST=$(printf '%s\n' "$DESC" | tail -n 1)
          echo "asc  first=$ASC_FIRST  last=$ASC_LAST"
          echo "desc first=$DESC_FIRST last=$DESC_LAST"
          # Only meaningful when the repo has >1 release
          if [ -n "$ASC_FIRST" ] && [ -n "$DESC_FIRST" ] \
              && [ "$ASC_FIRST" != "$ASC_LAST" ]; then
            if [ "$ASC_FIRST" = "$DESC_FIRST" ]; then
              echo "❌ asc and desc first entries should differ"
              exit 1
            fi
            if [ "$ASC_FIRST" != "$DESC_LAST" ]; then
              echo "❌ asc first should equal desc last (reverse order)"
              exit 1
            fi
            echo "✅ asc/desc ordering is consistent"
          else
            echo "ℹ️ Fixture repo has <2 releases; order check skipped"
          fi

      # ---------------------------------------------------------------
      # 9. Limit input: fetch at most N releases.
      # ---------------------------------------------------------------
      - name: "Test: limit caps the number of releases"
        id: limited
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          limit: "2"

      - name: "Validate: limit is honoured"
        shell: bash
        env:
          RELEASES: ${{ steps.limited.outputs.releases }}
        run: |
          # Validate limit is honoured
          set -euo pipefail
          if [ -z "$RELEASES" ]; then
            echo "❌ Expected at least one release with limit=2"
            exit 1
          fi
          COUNT=$(printf '%s\n' "$RELEASES" | wc -l | tr -d ' ')
          if [ "$COUNT" -gt 2 ]; then
            echo "❌ Expected <=2 releases with limit=2, got $COUNT"
            exit 1
          fi
          echo "✅ limit=2 returned $COUNT release(s)"

      # ---------------------------------------------------------------
      # 10. Production-only filter: pre-releases (and drafts) must be
      #     excluded. The expectation is computed dynamically from gh's
      #     own view of the fixture, so it can never drift. Drafts are
      #     not exercised here because the List Releases API only
      #     returns drafts to tokens with push access, which this
      #     cross-repo read-only CI token lacks; draft exclusion is
      #     covered end-to-end by the separate draft_exclusion job.
      # ---------------------------------------------------------------
      - name: "Test: production_only excludes pre-releases/drafts"
        id: production_only
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          production_only: "true"

      - name: "Validate: production_only filtering"
        shell: bash
        env:
          FILTERED: ${{ steps.production_only.outputs.releases }}
          PRERELEASE_COUNT: ${{ steps.fixture.outputs.prerelease_count }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Validate production_only filtering against gh ground truth
          set -euo pipefail
          if [ -z "$FILTERED" ]; then
            echo "❌ Expected at least one production release in output"
            exit 1
          fi

          # The frozen fixture always exposes a published pre-release.
          # If none is visible the fixture has been tampered with and
          # the exclusion assertion would be vacuous, so fail loudly.
          if [ "${PRERELEASE_COUNT:-0}" -lt 1 ]; then
            echo "❌ No visible pre-release in fixture; cannot validate" \
              "production_only exclusion. Restore the fixture matrix."
            exit 1
          fi

          # Ground truth straight from gh: the exact set of tags that a
          # production-only listing should contain (non-draft AND
          # non-pre-release), sorted for a stable comparison.
          EXPECTED=$(gh release list --repo "$FIXTURE_REPO" \
            --json tagName,isDraft,isPrerelease --limit 100 \
            -q '.[] | select((.isDraft|not) and (.isPrerelease|not))
                  | .tagName' | sort)
          ACTUAL=$(printf '%s\n' "$FILTERED" | sort)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ production_only output does not match gh ground truth"
            echo "Expected:"; printf '%s\n' "$EXPECTED"
            echo "Actual:"; printf '%s\n' "$ACTUAL"
            exit 1
          fi

          # Explicitly assert no visible pre-release survived the filter.
          while IFS= read -r PRE; do
            [ -z "$PRE" ] && continue
            if printf '%s\n' "$FILTERED" | grep -Fxq "$PRE"; then
              echo "❌ Pre-release $PRE must be excluded by production_only"
              exit 1
            fi
            echo "✅ Pre-release $PRE correctly excluded"
          done <<< "$(gh release list --repo "$FIXTURE_REPO" \
            --json tagName,isDraft,isPrerelease --limit 100 \
            -q '.[] | select(.isPrerelease and (.isDraft|not)) | .tagName')"

          echo "✅ production_only output matches gh ground truth"

      # ---------------------------------------------------------------
      # 11. Negative: invalid repository must fail fast.
      # ---------------------------------------------------------------
      - name: "Test: invalid repository input"
        id: bad_repo
        uses: ./
        continue-on-error: true
        with:
          repository: "not-a-valid-repo-string"

      - name: "Validate: invalid repository was rejected"
        if: steps.bad_repo.outcome == 'success'
        shell: bash
        run: |
          # Invalid repository should have failed
          echo "❌ Expected invalid repository input to fail"
          exit 1

      # ---------------------------------------------------------------
      # 12. Negative: invalid return_type must fail fast.
      # ---------------------------------------------------------------
      - name: "Test: invalid return_type input"
        id: bad_return_type
        uses: ./
        continue-on-error: true
        with:
          repository: ${{ env.FIXTURE_REPO }}
          return_type: "yaml"

      - name: "Validate: invalid return_type was rejected"
        if: steps.bad_return_type.outcome == 'success'
        shell: bash
        run: |
          # Invalid return_type should have failed
          echo "❌ Expected invalid return_type to fail"
          exit 1

      # ---------------------------------------------------------------
      # 13. Negative: invalid order must fail fast.
      # ---------------------------------------------------------------
      - name: "Test: invalid order input"
        id: bad_order
        uses: ./
        continue-on-error: true
        with:
          repository: ${{ env.FIXTURE_REPO }}
          order: "sideways"

      - name: "Validate: invalid order was rejected"
        if: steps.bad_order.outcome == 'success'
        shell: bash
        run: |
          # Invalid order should have failed
          echo "❌ Expected invalid order to fail"
          exit 1

      # ---------------------------------------------------------------
      # 14. Negative: invalid limit must fail fast.
      # ---------------------------------------------------------------
      - name: "Test: invalid limit input"
        id: bad_limit
        uses: ./
        continue-on-error: true
        with:
          repository: ${{ env.FIXTURE_REPO }}
          limit: "zero"

      - name: "Validate: invalid limit was rejected"
        if: steps.bad_limit.outcome == 'success'
        shell: bash
        run: |
          # Invalid limit should have failed
          echo "❌ Expected invalid limit to fail"
          exit 1

      # ---------------------------------------------------------------
      # 15. Negative: invalid json_fields (trailing comma) must fail.
      # ---------------------------------------------------------------
      - name: "Test: invalid json_fields input"
        id: bad_fields
        uses: ./
        continue-on-error: true
        with:
          repository: ${{ env.FIXTURE_REPO }}
          return_type: "json"
          json_fields: "tagName,"

      - name: "Validate: invalid json_fields was rejected"
        if: steps.bad_fields.outcome == 'success'
        shell: bash
        run: |
          # Invalid json_fields should have failed
          echo "❌ Expected invalid json_fields to fail"
          exit 1

      # ---------------------------------------------------------------
      # 16. Case-insensitive input normalisation.
      # ---------------------------------------------------------------
      - name: "Test: mixed-case inputs are normalised"
        id: mixed_case
        uses: ./
        with:
          repository: ${{ env.FIXTURE_REPO }}
          return_type: "JSON"
          order: "DESC"
          production_only: "TRUE"
          json_fields: "tagName"

      - name: "Validate: mixed-case inputs accepted"
        shell: bash
        env:
          RELEASES: ${{ steps.mixed_case.outputs.releases }}
        run: |
          # Validate mixed-case normalisation
          set -euo pipefail
          if [ -z "$RELEASES" ]; then
            echo "❌ Expected JSON payload from mixed-case invocation"
            exit 1
          fi
          echo "$RELEASES" | python3 -c 'import json,sys; json.load(sys.stdin)'
          echo "✅ Mixed-case inputs normalised successfully"

      - name: "Test summary"
        shell: bash
        run: |
          # Test summary
          echo "### ✅ All action test scenarios passed" \
            >> "$GITHUB_STEP_SUMMARY"

  ### End-to-end draft exclusion (cannot run with a read-only token) ###
  # Drafts are only returned by the List Releases API to tokens with
  # push access, so they can never be seen by the cross-repo read-only
  # token used above. This job creates a throwaway draft in THIS repo,
  # where the workflow token can be granted write access, verifies the
  # action excludes it under production_only, then deletes it. It is
  # skipped on pull_request events because fork PRs receive a read-only
  # token that cannot create releases; draft exclusion is therefore
  # validated on pushes to main and via manual dispatch.
  draft_exclusion:
    name: "Draft exclusion (end-to-end)"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Create throwaway draft release"
        id: mkdraft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ github.repository }}
        run: |
          # Create an ephemeral draft release to exercise exclusion
          set -euo pipefail
          DRAFT_TAG="zz-test-draft-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          # Draft releases do not create a git tag ref until published
          # (GitHub serves them from an "untagged-*" slug), so this
          # creates no tag, leaves nothing behind for tag-based workflows
          # such as tag-push to react to, and needs no tag cleanup.
          gh release create "$DRAFT_TAG" \
            --repo "$TARGET_REPO" \
            --draft \
            --title "$DRAFT_TAG" \
            --notes "Ephemeral draft for production_only test; safe to delete"
          echo "draft_tag=$DRAFT_TAG" >> "$GITHUB_OUTPUT"
          echo "Created draft release $DRAFT_TAG in $TARGET_REPO"

      - name: "List including drafts (production_only=false)"
        id: unfiltered
        uses: ./
        with:
          repository: ${{ github.repository }}
          production_only: "false"

      - name: "List excluding drafts (production_only=true)"
        id: filtered
        uses: ./
        with:
          repository: ${{ github.repository }}
          production_only: "true"

      - name: "Validate: draft excluded by production_only"
        shell: bash
        env:
          DRAFT_TAG: ${{ steps.mkdraft.outputs.draft_tag }}
          UNFILTERED: ${{ steps.unfiltered.outputs.releases }}
          FILTERED: ${{ steps.filtered.outputs.releases }}
        run: |
          # Validate draft exclusion end-to-end
          set -euo pipefail
          if ! printf '%s\n' "$UNFILTERED" | grep -Fxq "$DRAFT_TAG"; then
            echo "❌ Draft $DRAFT_TAG not visible in unfiltered output;" \
              "cannot validate exclusion (token may lack push access)"
            exit 1
          fi
          if printf '%s\n' "$FILTERED" | grep -Fxq "$DRAFT_TAG"; then
            echo "❌ Draft $DRAFT_TAG must be excluded by production_only"
            exit 1
          fi
          echo "✅ Draft $DRAFT_TAG correctly excluded by production_only"

      - name: "Cleanup throwaway draft release"
        if: always() && steps.mkdraft.outputs.draft_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ github.repository }}
          DRAFT_TAG: ${{ steps.mkdraft.outputs.draft_tag }}
        run: |
          # Remove the ephemeral draft release
          set -euo pipefail
          # A draft release never creates a git tag ref (GitHub serves it
          # from an "untagged-*" slug until published), so only the
          # release object needs removing. Surface a failure as a visible
          # warning rather than masking it, but do not fail the job on
          # cleanup so the test result above stays the primary signal.
          if gh release delete "$DRAFT_TAG" --repo "$TARGET_REPO" --yes; then
            echo "Deleted draft release $DRAFT_TAG"
          else
            echo "::warning::Could not delete draft release $DRAFT_TAG;" \
              "no tag ref is created for drafts, so remove the orphaned" \
              "draft manually from the repository's Releases page"
          fi
