# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10 # Increase this timeout value as needed
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Perform setup prior to running test(s)
      - name: "Testing setup step"
        shell: bash
        run: |
          # Testing setup step
          echo "Testing setup step"
          echo "Testing setup step/summary output" >> "$GITHUB_STEP_SUMMARY"

      - name: "Running local action: ${{ github.repository }}"
        uses: ./
        with:
          SUMMARY_OUTPUT: "true"

      - name: "Validated local action: ${{ github.repository }}"
        shell: bash
        run: |
          # Local action validation
          echo "Validated local action: ${{ github.repository }}"
          echo "Validation step summary output" >> "$GITHUB_STEP_SUMMARY"

      # Test targeting a remote repository (no checkout required).
      # The target repository is public and has stable, tagged releases.
      - name: "Running local action against remote repository"
        id: remote
        uses: ./
        with:
          REPOSITORY: "lfreleng-actions/test-python-project"
          SUMMARY_OUTPUT: "true"

      # Negative test: malformed REPOSITORY input must fail fast
      - name: "Running local action with invalid REPOSITORY"
        id: remote_failure
        uses: ./
        continue-on-error: true
        with:
          REPOSITORY: "not-a-valid-repo-string"

      - name: "Error if invalid REPOSITORY step did NOT fail"
        if: steps.remote_failure.outcome == 'success'
        shell: bash
        run: |
          # Error if invalid REPOSITORY step did NOT fail
          echo "Error: invalid REPOSITORY input did NOT fail ❌"
          exit 1
